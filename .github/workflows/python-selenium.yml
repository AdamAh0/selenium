name: Python Selenium Scraping Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
      - name: Remove all chromedriver from PATH
        run: |
          sudo rm -f /usr/local/bin/chromedriver || true
          sudo rm -f /usr/bin/chromedriver || true
      - name: Run tests
        env:
          WDM_LOG_LEVEL: 0
        run: |
          python -m unittest discover .
